# Use 256-color tmux terminal (needed for correct color support in neovim etc.)
set -g default-terminal "tmux-256color"
# Enable true color (24-bit) passthrough for terminals that support it
set -ga terminal-overrides ",*:RGB"

# Enable mouse support (click to focus panes, scroll, resize)
set -g mouse on
# Sync tmux copy buffer with the system clipboard
set -g set-clipboard on

# Eliminate the delay after pressing Esc (important for vim mode switching)
set -s escape-time 0

# Remap prefix from C-b to C-Space
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

# Vim-style pane focus (requires prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Split panes, preserving the current directory
unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Reload config in-place
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Start window and pane numbering at 1 to match keyboard layout
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
# Renumber windows sequentially when one is closed
set-option -g renumber-windows on

# Vim-style copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-selection-and-cancel
# Don't exit copy mode on mouse drag end (lets you refine selection)
unbind -T copy-mode-vi MouseDragEnd1Pane

# Alt+hjkl to switch panes without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+number to jump directly to a window without prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Shift+arrow to cycle through windows without prefix
bind -n S-Left  previous-window
bind -n S-Right next-window
